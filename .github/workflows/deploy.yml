name: Deploy CV to Production

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
        coverage: none

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Prepare Environment
      run: |
        cp .env.example .env
        mkdir -p storage/framework/cache/data
        mkdir -p storage/framework/sessions
        mkdir -p storage/framework/testing
        mkdir -p storage/framework/views
        mkdir -p storage/logs
        mkdir -p bootstrap/cache

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-dev --no-interaction --no-plugins --no-progress --optimize-autoloader

    - name: Generate Key
      run: php artisan key:generate

    - name: Install NPM Dependencies & Build
      run: |
        npm install
        npm run build

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          source ~/.bashrc 2>/dev/null || true
          set -e
          cd ${{ secrets.DEPLOY_PATH }}
          git pull origin master
          
          # Création des dossiers essentiels sur le serveur
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/testing
          mkdir -p storage/framework/views
          mkdir -p bootstrap/cache
          
          composer install --no-dev --optimize-autoloader
          php artisan migrate --force
          php artisan optimize
          php artisan view:cache
          php artisan livewire:configure-sfc --no-interaction
